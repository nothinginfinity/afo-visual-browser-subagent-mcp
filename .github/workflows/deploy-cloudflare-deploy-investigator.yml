name: Cloudflare Deploy Investigator

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-cloudflare-deploy-investigator.yml
      - subagents/cloudflare-deploy-investigator/**

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-deploy-investigator
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy afo-cloudflare-deploy-investigator-mcp
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy Worker
        shell: bash
        run: npx wrangler@latest deploy --config subagents/cloudflare-deploy-investigator/wrangler.jsonc
