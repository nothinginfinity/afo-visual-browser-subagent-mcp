name: Deploy MCP Tool Auditor

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-mcp-tool-auditor.yml
      - subagents/mcp-tool-auditor/**
      - scripts/subagents.json

permissions:
  contents: read

concurrency:
  group: deploy-mcp-tool-auditor
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy afo-mcp-tool-auditor
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify required GitHub secrets are present
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN GitHub secret"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID GitHub secret"
            exit 1
          fi

      - name: Deploy Worker
        shell: bash
        run: npx wrangler@latest deploy --config subagents/mcp-tool-auditor/wrangler.jsonc

      - name: Deployment note
        shell: bash
        run: |
          echo "Deployed Worker: afo-mcp-tool-auditor"
          echo "Expected URL: https://afo-mcp-tool-auditor.jaredtechfit.workers.dev/status"
          echo "MCP URL: https://afo-mcp-tool-auditor.jaredtechfit.workers.dev/mcp"
